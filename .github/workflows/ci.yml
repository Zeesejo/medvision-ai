name: CI — Lint & Import Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint & Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint dependencies
        run: |
          pip install flake8 pyflakes

      - name: Run flake8 (style)
        run: |
          flake8 src/ --max-line-length=120 --ignore=E501,W503,E203 --statistics

      - name: Check imports resolve
        run: |
          python -c "import ast, sys, pathlib
          errors = []
          for f in pathlib.Path('src').rglob('*.py'):
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('Syntax errors found:')
              for e in errors: print(' ', e)
              sys.exit(1)
          else:
              print('All .py files parse cleanly.')
          "
