# Default experiment config

project:
  name: medvision-ai
  seed: 42

data:
  root: data/chestxray14
  csv_path: data/chestxray14/Data_Entry_2017.csv
  image_size: 224
  batch_size: 32
  num_workers: 4
  train_split: 0.7
  val_split: 0.1
  test_split: 0.2

model:
  backbone: resnet50        # options: resnet50, vit_base_patch16_224
  pretrained: true
  num_classes: 14
  dropout: 0.3

training:
  epochs: 30
  lr: 1e-4
  weight_decay: 1e-5
  scheduler: cosine         # options: cosine, step, plateau
  warmup_epochs: 3
  mixed_precision: true
  early_stopping_patience: 7

xai:
  method: gradcam           # options: gradcam, gradcam++, shap
  target_layer: layer4      # for resnet50
  num_shap_samples: 100

logging:
  use_wandb: true
  project: medvision-xai
  save_dir: results/
  log_interval: 10
