# MedVision-AI — Central Configuration
# Update data_dir to match your local path before training

data:
  data_dir: "F:/NIH Chest X-Ray dataset/archive"
  images_subdir: "images"                          # not used directly; img_dir is the archive root
  labels_file: "F:/NIH Chest X-Ray dataset/archive/Data_Entry_2017.csv"
  train_val_list: "F:/NIH Chest X-Ray dataset/archive/train_val_list.txt"
  test_list: "F:/NIH Chest X-Ray dataset/archive/test_list.txt"
  # CSV files generated by: python scripts/prepare_csv.py
  train_csv: "F:/NIH Chest X-Ray dataset/archive/train_val.csv"
  val_csv:   "F:/NIH Chest X-Ray dataset/archive/val.csv"
  # img_dir should point to the archive root (images are in images_001 ... images_012 subfolders)
  img_dir:   "F:/NIH Chest X-Ray dataset/archive"
  image_size: 320
  num_workers: 4


model:
  backbone: "densenet121"       # densenet121 | resnet50 | vit_base_patch16_224
  pretrained: true
  dropout: 0.3
  freeze_backbone: false


training:
  epochs: 30
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0001
  loss: "asl"                   # bce | focal | asl
  scheduler: "cosine"           # cosine | step | none
  warmup_epochs: 3
  early_stopping_patience: 7
  amp: true                     # mixed precision (faster on GPU)
  grad_clip: 1.0


logging:
  use_wandb: true               # set true after: pip install wandb && wandb login
  project: "medvision-ai"
  run_name: "densenet121-320px-asl"
  save_dir: "results/checkpoints"
  log_every_n_steps: 50


classes:
  - Atelectasis
  - Cardiomegaly
  - Effusion
  - Infiltration
  - Mass
  - Nodule
  - Pneumonia
  - Pneumothorax
  - Consolidation
  - Edema
  - Emphysema
  - Fibrosis
  - Pleural_Thickening
  - Hernia
